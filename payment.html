<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Checkout — Sandesh Kadam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #222222;
      --parchment: #EEEEEE;
      --brass-bright: #C9A158;
      --maroon: #5C1A1A;
      --ink: #1A1714;
      --hairline: #C9BFA8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .checkout-modal {
      background: #FFFFFF;
      width: 100%;
      max-width: 440px;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .checkout-header {
      background: var(--navy);
      color: var(--parchment);
      padding: 32px;
      text-align: center;
    }
    .seal {
      width: 56px; height: 56px;
      border: 1.5px solid var(--brass-bright);
      border-radius: 50%;
      margin: 0 auto 16px;
      object-fit: cover;
    }
    .checkout-header h2 {
      font-family: 'Source Serif 4', serif;
      font-size: 20px;
      margin-bottom: 4px;
    }
    .checkout-header .amount {
      font-size: 32px;
      font-weight: 600;
      color: var(--brass-bright);
    }
    .checkout-body {
      padding: 32px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8A8270;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      padding: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--navy); }
    .row { display: flex; gap: 16px; }
    .row > div { flex: 1; }
    
    .pay-btn {
      width: 100%;
      background: var(--navy);
      color: var(--parchment);
      border: none;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .pay-btn:hover { background: var(--maroon); }
    
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: #8A8270;
      margin-top: 16px;
    }
    
    .cancel-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #8A8270;
      text-decoration: none;
    }
    .cancel-link:hover { color: var(--maroon); text-decoration: underline; }
  </style>
</head>
<body>

  <div class="checkout-modal">
    <div class="checkout-header">
      <img src="clientphoto.jpeg" alt="Advocate Sandesh Kadam" class="seal">
      <h2>Adv. Sandesh Kadam</h2>
      <div class="amount">₹1,500.00</div>
      <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px;">Legal Consultation (30 Min)</div>
    </div>
    
    <div class="checkout-body">
      <div class="field">
        <label>Cardholder Name</label>
        <input type="text" placeholder="John Doe">
      </div>
      <div class="field">
        <label>Card Number</label>
        <input type="text" placeholder="0000 0000 0000 0000">
      </div>
      <div class="row">
        <div class="field">
          <label>Expiry (MM/YY)</label>
          <input type="text" placeholder="MM / YY">
        </div>
        <div class="field">
          <label>CVV</label>
          <input type="password" placeholder="•••">
        </div>
      </div>
      
      <button class="pay-btn" onclick="simulatePayment(this)">Pay Securely</button>
      
      <div class="secure-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        256-bit Encrypted Checkout
      </div>
      
      <a href="index.html" class="cancel-link">← Cancel and return to website</a>
    </div>
  </div>

  <script>
    function simulatePayment(btn) {
      btn.innerText = 'Processing...';
      btn.style.opacity = '0.8';
      setTimeout(() => {
        alert("Payment successful! In a real app, you would be redirected to a confirmation page.");
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>
</body>
</html>
